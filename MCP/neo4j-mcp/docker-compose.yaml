services:
  mcp-neo4j:
    image: mcp/neo4j-cypher:latest
    container_name: mcp-neo4j
    ports:
      - "${NEO4J_MCP_SERVER_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_TRANSPORT: ${NEO4J_TRANSPORT}
      NEO4J_MCP_SERVER_HOST: ${NEO4J_MCP_SERVER_HOST}
      NEO4J_MCP_SERVER_PORT: ${NEO4J_MCP_SERVER_PORT}