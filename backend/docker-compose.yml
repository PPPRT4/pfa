version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pfa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pfa_db}
      POSTGRES_USER: ${POSTGRES_USER:-pfa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfa_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  neo4j:
    image: neo4j:latest
    container_name: pfa_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
        - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
        - NEO4J_PLUGINS=["apoc"] # helps with loading transforming and work with graph data
    volumes:
        - neo4j_logs:/logs
        - neo4j_data:/data
        - neo4j_plugins:/plugins
        - neo4j_import:/import # to load external files
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_logs:
  neo4j_data:
  neo4j_plugins:
  neo4j_import:
